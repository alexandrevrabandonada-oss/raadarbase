name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      NEXT_PUBLIC_USE_MOCKS: "true"
      E2E_BYPASS_AUTH: "false"
      E2E_TEST_MODE: "true"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      META_APP_SECRET: ci-meta-app-secret
      META_ACCESS_TOKEN: ci-meta-access-token
      META_WEBHOOK_VERIFY_TOKEN: ci-meta-webhook-verify-token
      META_WEBHOOK_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: CI Pipeline
        run: npm run ci