name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_USE_MOCKS: "false"
          E2E_BYPASS_AUTH: "false"
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key

      - name: Unit tests
        run: npm run test

      - name: Healthcheck
        run: npm run check:health

      - name: E2E CI
        run: npm run e2e:ci